services:
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "81:80"

  backend:
    build: ./backend
    env_file: .env
    restart: unless-stopped
    ports:
      - "8001:8000"

  db:
    image: mysql:8.0
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: